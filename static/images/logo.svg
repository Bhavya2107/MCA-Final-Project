<svg width="200" height="80" viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Shield -->
  <path d="M 40 10 L 60 25 L 60 50 Q 40 65 40 65 Q 20 65 20 50 L 20 25 Z" 
        fill="url(#shieldGradient)" stroke="white" stroke-width="1" opacity="0.95"/>
  
  <!-- Shield highlights -->
  <path d="M 40 10 L 60 25 L 60 50 Q 40 65 40 65 Q 20 65 20 50 L 20 25 Z" 
        fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.5" stroke-linejoin="round"/>
  
  <!-- Center checkmark -->
  <path d="M 32 42 L 36 46 L 45 35" 
        fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
